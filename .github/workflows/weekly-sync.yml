name: Weekly TAP sync

on:
  schedule:
    # Every Sunday at 00:05 IST (Saturday 18:35 UTC)
    - cron: "35 18 * * 6"
  workflow_dispatch:

concurrency:
  group: tap-weekly-sync
  cancel-in-progress: false

jobs:
  dbt-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure dbt profile
        env:
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "GCP_SA_KEY secret is not set."
            exit 1
          fi

          echo "$GCP_SA_KEY" > "${RUNNER_TEMP}/gcp-key.json"

          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          tap:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: ${BQ_PROJECT}
                dataset: ${BQ_DATASET:-Activity_Funnel}
                keyfile: ${RUNNER_TEMP}/gcp-key.json
                location: US
                threads: 4
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: Build Activity Funnel pipeline
        run: dbt build --select tag:activity_funnel
